<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AdaptAI - Generate Course</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-tint": "#a3a6ff",
                        "outline": "#6f7588",
                        "tertiary-fixed": "#8ab0ff",
                        "primary-container": "#9396ff",
                        "surface-dim": "#080e1d",
                        "on-tertiary-fixed-variant": "#00377b",
                        "on-secondary-fixed": "#4f0089",
                        "on-error": "#490013",
                        "tertiary-fixed-dim": "#73a2ff",
                        "surface-container-low": "#0c1324",
                        "on-surface-variant": "#a5aabf",
                        "on-primary-fixed": "#000000",
                        "on-primary-fixed-variant": "#0e009d",
                        "surface-container-high": "#171f33",
                        "primary-fixed-dim": "#8387ff",
                        "surface-container-highest": "#1d253b",
                        "on-surface": "#e0e5fb",
                        "outline-variant": "#424859",
                        "error-dim": "#d73357",
                        "on-primary-container": "#0a0081",
                        "secondary-container": "#6f00be",
                        "surface-bright": "#222c43",
                        "tertiary": "#699cff",
                        "inverse-surface": "#faf8ff",
                        "on-background": "#e0e5fb",
                        "primary": "#6366F1",
                        "background": "#080e1d",
                        "primary-dim": "#6063ee",
                        "tertiary-dim": "#699cff",
                        "secondary-dim": "#9c48ea",
                        "on-primary": "#ffffff",
                        "surface-variant": "#1d253b",
                        "on-secondary-fixed-variant": "#7511c3",
                        "on-tertiary": "#001e4a",
                        "secondary-fixed-dim": "#dbb4ff",
                        "inverse-on-surface": "#4f5566",
                        "on-error-container": "#ffb2b9",
                        "tertiary-container": "#4388fd",
                        "surface-container": "#12192b",
                        "surface-container-lowest": "#000000",
                        "error-container": "#a70138",
                        "error": "#ff6e84",
                        "on-secondary-container": "#e9cdff",
                        "primary-fixed": "#9396ff",
                        "on-tertiary-container": "#000311",
                        "on-secondary": "#33005b",
                        "secondary": "#c180ff",
                        "secondary-fixed": "#e5c6ff",
                        "on-tertiary-fixed": "#00163b",
                        "surface": "#080e1d",
                        "inverse-primary": "#494bd7"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-effect {
            backdrop-filter: blur(24px) saturate(180%);
            background: rgba(12, 19, 36, 0.7);
        }
        .text-glow-primary {
            text-shadow: 0 0 15px rgba(163, 166, 255, 0.4);
        }
        .mesh-gradient {
            background-color: #080e1d;
            background-image: 
                radial-gradient(at 0% 0%, hsla(230,100%,10%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(243,90%,15%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(260,100%,10%,1) 0, transparent 50%);
        }
        .input-glow:focus {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.5);
        }
        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #a3a6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Content (Blurred) -->
<div class="fixed inset-0 z-0 overflow-hidden filter blur-2xl opacity-50 pointer-events-none mesh-gradient">
<header class="flex justify-between items-center w-full px-8 py-4 bg-transparent">
<div class="text-2xl font-bold tracking-tighter text-[#a3a6ff]">AdaptAI</div>
<div class="flex gap-8 text-[#a5aabf]">
<span>Dashboard</span>
<span>My Courses</span>
<span>Library</span>
<span>Community</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#a5aabf]">notifications</span>
<div class="w-10 h-10 rounded-full bg-surface-container"></div>
</div>
</header>
<main class="max-w-7xl mx-auto px-8 py-20">
<div class="grid grid-cols-12 gap-8">
<div class="col-span-8">
<h1 class="text-8xl font-extrabold tracking-tighter mb-6">Learn Your Way.</h1>
<p class="text-2xl text-on-surface-variant max-w-2xl mb-12">An adaptive learning ecosystem that creates personalized roadmaps.</p>
</div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-md">
<!-- Neural Horizon Modal Container -->
<div class="relative w-full max-w-2xl glass-effect rounded-xl overflow-hidden shadow-[0px_32px_64px_rgba(0,0,0,0.6)] ring-1 ring-white/10">
<!-- Decorative Glow Elements -->
<div class="absolute -top-40 -left-40 w-80 h-80 bg-primary/20 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute -bottom-40 -right-40 w-80 h-80 bg-secondary/15 rounded-full blur-[100px] pointer-events-none"></div>
<div class="relative p-8 md:p-14">
<!-- Header -->
<div class="flex justify-between items-start mb-12">
<div class="space-y-3">
<div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-primary text-[10px] font-bold tracking-[0.2em] uppercase">
<span class="flex h-2 w-2 relative">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
                            AI Engine v1.0
                        </div>
<h2 class="text-5xl font-black tracking-tight text-on-surface leading-tight">
                            Generate a <span class="text-gradient">Course</span>
</h2>
<p class="text-on-surface-variant text-lg font-medium opacity-80">Define your learning path with neural precision.</p>
</div>
<button class="p-2 text-on-surface-variant hover:text-on-surface hover:rotate-90 transition-all duration-300">
<span class="material-symbols-outlined text-3xl">close</span>
</button>
</div>
<!-- Form -->
<form class="space-y-10">
<!-- Course Title -->
<div class="space-y-4">
<label class="block text-xs font-bold tracking-[0.15em] text-primary uppercase ml-1 opacity-90">Course Title</label>
<div class="group relative">
<input class="w-full bg-[#0a0f1d] border border-white/10 rounded-lg px-6 py-5 text-on-surface placeholder:text-outline/50 focus:ring-0 focus:border-primary/50 input-glow transition-all duration-300" placeholder="e.g., Advanced Quantum Mechanics" type="text"/>
<div class="absolute inset-0 rounded-lg bg-gradient-to-r from-primary/20 to-transparent opacity-0 group-focus-within:opacity-100 transition-opacity pointer-events-none"></div>
</div>
</div>
<!-- Row: Difficulty & Chapters -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-10">
<div class="space-y-4">
<label class="block text-xs font-bold tracking-[0.15em] text-primary uppercase ml-1 opacity-90">Difficulty Level</label>
<div class="relative group">
<select class="w-full bg-[#0a0f1d] border border-white/10 rounded-lg px-6 py-5 text-on-surface appearance-none focus:ring-0 focus:border-primary/50 input-glow transition-all">
<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant group-hover:text-primary transition-colors">expand_more</span>
</div>
</div>
<div class="space-y-4">
<label class="block text-xs font-bold tracking-[0.15em] text-primary uppercase ml-1 opacity-90">Chapters</label>
<div class="relative group">
<select class="w-full bg-[#0a0f1d] border border-white/10 rounded-lg px-6 py-5 text-on-surface appearance-none focus:ring-0 focus:border-primary/50 input-glow transition-all">
<option>5 Chapters</option>
<option>10 Chapters</option>
<option>15 Chapters</option>
<option>20 Chapters</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant group-hover:text-primary transition-colors">expand_more</span>
</div>
</div>
</div>
<!-- YouTube Link (Optional) -->
<div class="space-y-4">
<div class="flex justify-between items-center ml-1">
<label class="block text-xs font-bold tracking-[0.15em] text-primary uppercase opacity-90">Source Material (Optional)</label>
<span class="text-[10px] text-outline font-bold tracking-widest uppercase">YouTube URL</span>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-error-dim/70 group-focus-within:text-error transition-colors">video_library</span>
<input class="w-full bg-[#0a0f1d] border border-white/10 rounded-lg pl-14 pr-6 py-5 text-on-surface placeholder:text-outline/50 focus:ring-0 focus:border-primary/50 input-glow transition-all" placeholder="https://youtube.com/watch?v=..." type="url"/>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col-reverse md:flex-row items-center justify-end gap-6 pt-8">
<button class="w-full md:w-auto px-8 py-4 text-on-surface-variant font-bold tracking-widest text-xs uppercase hover:text-white transition-colors duration-300" type="button">
                            Cancel
                        </button>
<button class="w-full md:w-auto group relative px-12 py-5 bg-gradient-to-r from-[#6366F1] via-[#8B5CF6] to-[#D946EF] rounded-full font-black text-white shadow-[0_0_30px_rgba(99,102,241,0.4)] hover:shadow-[0_0_50px_rgba(99,102,241,0.6)] hover:scale-[1.02] active:scale-95 transition-all duration-500 overflow-hidden" type="submit">
<span class="relative z-10 flex items-center justify-center gap-3 tracking-widest text-xs uppercase">
<span class="material-symbols-outlined scale-110" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                                Generate Course
                            </span>
<div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 blur-xl"></div>
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000 ease-in-out"></div>
</button>
</div>
</form>
</div>
</div>
</div>
</body></html>
